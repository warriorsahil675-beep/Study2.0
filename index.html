<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Study Video Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0b0b0c;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 20px;
      font-weight: 500;
    }

    .search-box {
      margin-top: 20px;
    }

    input {
      width: 60%;
      max-width: 600px;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #111;
      color: white;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin-left: 8px;
      cursor: pointer;
      background: #4da6ff;
      color: black;
      font-weight: bold;
    }

    .video-container {
      margin-top: 30px;
      width: 90%;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      padding-top: 56.25%;
      display: none;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .message {
      margin-top: 20px;
      color: #aaa;
      font-size: 14px;
    }

    @media(max-width: 600px) {
      input {
        width: 90%;
        margin-bottom: 10px;
      }
      button {
        width: 90%;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <h1>Study Video Viewer</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search study video..." />
    <button onclick="searchVideo()">Search</button>
  </div>

  <div class="message" id="status"></div>

  <div class="video-container" id="videoContainer"></div>

  <script>
    const API_KEY = "AIzaSyDoQ3sQk6xxHC8HuNB_xsyTM8hwR71f-WY"; // 🔴 Replace with your YouTube API key

    async function searchVideo() {
      const query = document.getElementById("searchInput").value.trim();
      const status = document.getElementById("status");
      const container = document.getElementById("videoContainer");

      if (!query) return;

      status.innerText = "Searching...";
      container.style.display = "none";
      container.innerHTML = "";

      try {
        const response = await fetch(
          `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q=${encodeURIComponent(query)}&key=${API_KEY}`
        );

        const data = await response.json();

        if (!data.items || data.items.length === 0) {
          status.innerText = "No results found.";
          return;
        }

        const videoId = data.items[0].id.videoId;

        const embedURL = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&controls=1`;

        container.innerHTML = `
          <iframe 
            src="${embedURL}" 
            allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        `;

        container.style.display = "block";
        status.innerText = "";

      } catch (error) {
        status.innerText = "Error fetching video.";
      }
    }

    // Allow Enter key to search
    document.getElementById("searchInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        searchVideo();
      }
    });
  </script>

</body>
</html>
